version: '3.8'

services:
  app:
    build: .
    container_name: deep-thought-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /Users/ms1/Library/Application Support/pywhispercpp/models:/app/models:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # Maps host macOS localhost access for LM Studio
